<!DOCTYPE html>
<html>
<head>
    <title>Verify Login</title>
</head>

<body>
<div class="login-box">

    <h2>Two-Factor Authentication</h2>

    <p>Enter the verification code sent to your email.</p>

    <!-- Displays error messages -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('verify') }}">

        <input
            type="text"
            name="code"
            maxlength="6"
            placeholder="123456"
            required>

        <button type="submit">
            Verify
        </button>

    </form>

</div>

</body>
</html>
