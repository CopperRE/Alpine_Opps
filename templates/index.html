<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <!--
        If Flask sends an error message,
        display it here.
    -->
    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <!--
        The form sends the data to
        the /login route in app.py
    -->
    <form action="/login" method="POST">

        <!-- Username -->
        <label>User ID</label>

        <input
            type="text"
            name="username"
            placeholder="Enter User ID"
            required
        >

        <!-- Password -->
        <label>Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <!-- Login Button -->
        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>

</html>
